[mypy]
python_version = 3.11
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
strict_optional = True
plugins = pydantic.mypy
; numpy and pandas-stubs do not yet support fully strict typing without
; thousands of spurious diagnostics on idiomatic vectorized code. We keep
; the full strict bundle except for the two flags that fight third-party
; stubs. See docs/adr/ADR-006-mypy-strict-pragmatism.md.
warn_return_any = False
disallow_any_generics = False
exclude = (?x)(
    ^build/
  | ^docs/
  | ^notebooks/
  | ^tests/
  )

[mypy-yfinance.*]
ignore_missing_imports = True

[mypy-pandas_datareader.*]
ignore_missing_imports = True

[mypy-statsmodels.*]
ignore_missing_imports = True

[mypy-lightgbm.*]
ignore_missing_imports = True

[mypy-cvxpy.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-numba.*]
ignore_missing_imports = True

[mypy-joblib.*]
ignore_missing_imports = True

[mypy-duckdb.*]
ignore_missing_imports = True

[mypy-sklearn.*]
ignore_missing_imports = True

[mypy-scipy.*]
ignore_missing_imports = True
