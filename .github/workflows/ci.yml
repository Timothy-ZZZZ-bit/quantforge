name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install
        run: uv pip install --system -e ".[dev]"
      - name: Ruff
        run: ruff check quantforge tests
      - name: Black check
        run: black --check quantforge tests
      - name: isort check
        run: isort --check-only quantforge tests --profile black --line-length 100

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv pip install --system -e ".[dev]"
      - name: mypy
        run: mypy quantforge

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install uv
      - run: uv pip install --system -e ".[dev]"
      - name: Unit + property tests
        run: pytest tests/unit tests/property --cov=quantforge --cov-report=xml -q
      - name: Upload coverage
        if: matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration:
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [lint, type, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv pip install --system -e ".[dev]"
      - name: Integration tests
        run: pytest tests/integration -q -m "not network"
