name: xsmom_sp500
description: >
  Cross-sectional 12-1 momentum on a large-cap US equity sample.
  Top/bottom decile long/short, equal weighted within each leg.
seed: 1729
rebalance: M

universe:
  name: large-cap-us
  tickers:
    - AAPL
    - MSFT
    - AMZN
    - GOOGL
    - META
    - NVDA
    - TSLA
    - JPM
    - V
    - JNJ
    - WMT
    - PG
    - UNH
    - HD
    - MA
    - BAC
    - XOM
    - CVX
    - PFE
    - KO
    - PEP
    - DIS
    - NFLX
    - INTC
    - CRM
    - CSCO
    - ADBE
  start: "2010-01-04"
  end: "2024-12-31"
  benchmark: SPY

signals:
  - name: xsmom_12_1
    kind: xsmom
    params:
      lookback: 252
      skip: 21
      decile: 0.20
    weight: 1.0

allocator:
  kind: equal_weight
  params:
    mode: signed

costs:
  commission_bps: 1.0
  slippage_bps: 5.0
  impact_coef: 0.10
  borrow_bps_annual: 50.0
  participation_cap: 0.10

constraints:
  max_weight: 0.10
  min_weight: -0.10
  gross_leverage: 1.0

validation:
  walk_forward:
    train_years: 5
    test_years: 1
    mode: rolling
  cpcv:
    n_groups: 10
    n_test_groups: 2
    embargo: 5
  cost_multipliers: [0.0, 1.0, 2.0, 5.0]
  bootstrap_replicates: 1000
